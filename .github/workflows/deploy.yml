name: Build & Deploy

# Trigger: push to main branch (adjust branch name if yours is different)
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (must match your local version)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install JavaScript dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the static site → produces the out/ directory
      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Verify the build produced a valid site
      - name: Verify build output
        run: |
          [ -d out/ ] || (echo "::error::Build failed: out/ directory missing" && exit 1)
          [ -f out/index.html ] || (echo "::error::Build failed: index.html not found" && exit 1)
          echo "Build OK — $(find out/ -type f | wc -l | tr -d ' ') files"

      # 6. Warn if Git LFS objects are approaching the 1 GB free-tier limit (90 % = 900 MB).
      #    This is a no-op when LFS is not in use; activates automatically if LFS is adopted.
      - name: Check Git LFS storage usage
        run: |
          if [ -d .git/lfs/objects ]; then
            USED=$(du -sb .git/lfs/objects | cut -f1)
            LIMIT=$((900 * 1024 * 1024))
            if [ "$USED" -gt "$LIMIT" ]; then
              echo "::warning title=Git LFS quota::LFS objects exceed 90% of the 1 GB free tier (${USED} bytes used). Consider upgrading storage: https://docs.github.com/en/billing/managing-billing-for-git-large-file-storage"
            fi
          fi

      # 7. Deploy out/ to the FTP server
      #    Credentials are stored in GitHub repository Secrets (Settings → Secrets and variables → Actions)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Only upload changed files (faster incremental deploys)
          state-name: .ftp-deploy-sync-state.json
          # Exclude the heavy assets/ folder from automatic sync
          # (assets only need re-uploading when you add/change images;
          #  see the conditional job below for that)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            assets/**

  # Optional separate job: only uploads assets when images actually changed.
  # Remove this entire job if you prefer to upload all assets every time.
  deploy-assets:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    # No job-level `if` — using git diff inside the job instead.
    # `github.event.head_commit` is null on PRs, workflow_dispatch, and
    # force-pushes, which caused the previous condition to silently skip
    # asset deploys in those cases.  git diff is reliable in all scenarios.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git diff works across any push depth

      # Detect whether any file under Jinee_website/assets-raw/ changed.
      # Writes `changed=true` or `changed=false` to $GITHUB_OUTPUT.
      # Handles force-pushes and first-ever pushes (before SHA is all zeroes).
      - name: Check for asset changes
        id: asset_changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED=$(git show --name-only --format="" HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || echo "")
          fi
          if echo "$CHANGED" | grep -q 'Jinee_website/assets-raw/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.asset_changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.asset_changes.outputs.changed == 'true'
        run: npm ci

      # Regenerate WebP images from assets-raw/
      - name: Build images
        if: steps.asset_changes.outputs.changed == 'true'
        run: npm run build:images

      - name: Build static site (to include new images in out/assets/)
        if: steps.asset_changes.outputs.changed == 'true'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload assets via FTP
        if: steps.asset_changes.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/assets/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}assets/
          state-name: .ftp-deploy-assets-sync-state.json

  # Generates backend config files from committed templates by injecting
  # credentials stored as GitHub Secrets, then uploads via FTP.
  # This way the repo can be public — no credentials ever touch git.
  deploy-backend-config:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Secrets are passed as env-vars and substituted using Python str.replace()
      # so special characters are handled safely.
      - name: Generate backend config files from templates
        env:
          DL_PASS_WALKING_TOUR_LITTLE_INDIA: ${{ secrets.DL_PASS_WALKING_TOUR_LITTLE_INDIA }}
          DL_PASS_20260124_WEST_SIDE_ART_TOUR: ${{ secrets.DL_PASS_20260124_WEST_SIDE_ART_TOUR }}
          DL_PASS_20260201_MEDIACORP_2026_CNY_ROAD_SHOW: ${{ secrets.DL_PASS_20260201_MEDIACORP_2026_CNY_ROAD_SHOW }}
          CONTACT_RECIPIENT: ${{ secrets.CONTACT_RECIPIENT }}
          CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}
          CONTACT_FROM_NAME: ${{ secrets.CONTACT_FROM_NAME }}
          CONTACT_SMTP_HOST: ${{ secrets.CONTACT_SMTP_HOST }}
          CONTACT_SMTP_PORT: ${{ secrets.CONTACT_SMTP_PORT }}
          CONTACT_SMTP_USER: ${{ secrets.CONTACT_SMTP_USER }}
          CONTACT_SMTP_PASS: ${{ secrets.CONTACT_SMTP_PASS }}
          CONTACT_SMTP_SECURE: ${{ secrets.CONTACT_SMTP_SECURE }}
        run: |
          mkdir -p /tmp/backend-config
          mkdir -p /tmp/backend-contact
          python3 - <<'PYEOF'
          import os

          # download_config.php (private/download)
          with open('backend/download/download_config.template.php') as f:
              content = f.read()
          content = content.replace(
              '%%DL_PASS_WALKING_TOUR_LITTLE_INDIA%%',
              os.environ['DL_PASS_WALKING_TOUR_LITTLE_INDIA'])
          content = content.replace(
              '%%DL_PASS_20260124_WEST_SIDE_ART_TOUR%%',
              os.environ['DL_PASS_20260124_WEST_SIDE_ART_TOUR'])
          content = content.replace(
              '%%DL_PASS_20260201_MEDIACORP_2026_CNY_ROAD_SHOW%%',
              os.environ['DL_PASS_20260201_MEDIACORP_2026_CNY_ROAD_SHOW'])
          with open('/tmp/backend-config/download_config.php', 'w') as f:
              f.write(content)

            # contact/config.php (public backend/contact)
            with open('backend/contact/config.template.php') as f:
              contact = f.read()
            contact = contact.replace('%%CONTACT_RECIPIENT%%', os.environ['CONTACT_RECIPIENT'])
            contact = contact.replace('%%CONTACT_FROM_EMAIL%%', os.environ['CONTACT_FROM_EMAIL'])
            contact = contact.replace('%%CONTACT_FROM_NAME%%', os.environ['CONTACT_FROM_NAME'])
            contact = contact.replace('%%CONTACT_SMTP_HOST%%', os.environ['CONTACT_SMTP_HOST'])
            contact = contact.replace('%%CONTACT_SMTP_PORT%%', os.environ['CONTACT_SMTP_PORT'])
            contact = contact.replace('%%CONTACT_SMTP_USER%%', os.environ['CONTACT_SMTP_USER'])
            contact = contact.replace('%%CONTACT_SMTP_PASS%%', os.environ['CONTACT_SMTP_PASS'])
            contact = contact.replace('%%CONTACT_SMTP_SECURE%%', os.environ['CONTACT_SMTP_SECURE'])
            with open('/tmp/backend-contact/config.php', 'w') as f:
              f.write(contact)
          PYEOF

      # Uploads the generated config to /private/download/ on the server.
      # download.php (in www/download/) resolves ../../private/download/download_config.php
      # which is why this goes to the private folder, NOT www/download/.
      # Set FTP_BACKEND_DIR = private/download/  (must end with /)
      - name: Upload download_config.php via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /tmp/backend-config/
          server-dir: ${{ secrets.FTP_BACKEND_DIR }}
          state-name: .ftp-deploy-backend-config-state.json
          dangerous-clean-slate: false

      # Uploads generated contact config to /backend/contact/ in webroot.
      # Set FTP_BACKEND_CONTACT_DIR to e.g. /public_html/backend/contact/ (must end with /)
      - name: Upload contact config.php via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /tmp/backend-contact/
          server-dir: ${{ secrets.FTP_BACKEND_CONTACT_DIR }}
          state-name: .ftp-deploy-contact-config-state.json
          dangerous-clean-slate: false
